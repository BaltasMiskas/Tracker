name: Run Daily Price Tracker
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight
  workflow_dispatch: # This adds a button so you can force it to run manually whenever you want

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives GitHub permission to update your index.html and history.json files
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install requests
      
    - name: Run Scraper
      run: python scrape.py
      
    - name: Commit changes back to repo
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add history.json index.html
        git commit -m "Automated dashboard update" || exit 0
        git push
